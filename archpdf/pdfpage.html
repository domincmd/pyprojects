<html>
<style>
body {
    font-family: sans-serif;
}

span.section-number, span.subsection-number {
    font-style: italic;
    color: #6b3e26;
}

p {
    text-align: justify;
    margin-top: 10px;
}

pre {
    background-color: #ebf1f5;
    padding: 1em;
    border: 1px solid #bcd;
    white-space: pre-wrap;      /* allow wrapping */
    word-wrap: break-word;      /* older support */
    overflow-wrap: break-word;  /* modern standard */
}

code {
    background-color: #ebf1f5;
}

.archwiki-template-meta-related-articles {
    border: 1px solid #333;
    max-width: 40%;
}

.archwiki-template-meta-related-articles > p {
    width: 100%;
    background-color: #333;
    border-bottom: 5px #08c solid;
    color: white;
    font-weight: bold;
    margin: 0;
    padding: 5px;
    box-sizing: border-box;
}

.archwiki-template-box {
    margin: 1em 0;
    padding: 0.5em 1em;
}



.archwiki-template-box strong::after {
  content: "\\A";
  white-space: pre;
}

.archwiki-template-box-warning {
    background-color: #fdd;
    border: 1px solid #ff5757;
    border-left: 5px solid #ff5757;
}

.archwiki-template-box-note {
    background-color: #dff0ff;
    border: 1px solid #08c;
    border-left: 5px solid #08c;
}

.archwiki-template-box-tip {
    background-color: #dfd;
    border: 1px solid #4dcb4d;
    border-left: 5px solid #4dcb4d;
}


h2 {
  margin: 0;
}

h3 {
  margin-top: 25px;
  margin-bottom: 0px;
}

h2::after {
  content: "";
  display: inline-block;
  width: 100%;
  height: 1px;
  background: #333;
  margin-right: 8px;
  margin-bottom: 10px;
}

table {
    border-collapse: collapse; /* prevents double borders */
    width: 100%;
}

table th,
table td {
    border: 1px solid #a2a9b1; /* same color everywhere */
    padding: 8px;
    background-color: #f9faff;
}

table > * > tr > th {
    background-color: #eaecf0;
    color: #202122;
    text-align: center;
}

table > caption {
    width: 100%;
    text-align: center;
}
</style>
<body>
</body>
</html>
